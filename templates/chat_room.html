<!DOCTYPE html>
<html lang="hi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>{{ room.name }} — TezKhabar Chat</title><link rel="icon" href="{{ logo_url }}">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:"Segoe UI",system-ui,sans-serif;background:#0a0a0a;color:#e0e0e0;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}

/* ── Top bar ── */
.chat-topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#111;border-bottom:1px solid #1a1a1a;flex-shrink:0;position:sticky;top:0;z-index:50}
.chat-back{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:7px;background:#1a1a1a;font-size:12px;color:#888;border:none;cursor:pointer;transition:.15s}
.chat-back:hover{color:#fff;background:#222}
.chat-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.chat-title{flex:1;font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-live{display:flex;align-items:center;gap:5px;font-size:10px;color:#4ade80;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.chat-live span{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Notice bar ── */
#notice-zone{flex-shrink:0}
.notice-bar{display:flex;align-items:center;gap:10px;padding:9px 16px;background:#1a1500;border-bottom:1px solid #3a2d00;font-size:12px;color:#fbbf24}
.notice-bar svg{width:15px;height:15px;stroke:#fbbf24;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.notice-bar .n-text{flex:1}
.notice-close{background:none;border:none;color:#fbbf24;cursor:pointer;font-size:14px;padding:0 4px;opacity:.7}

/* ── Messages area ── */
.chat-messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:#222;border-radius:4px}

/* ── Message bubble ── */
.msg{display:flex;gap:8px;align-items:flex-start;max-width:100%}
.msg.mine{flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;background:#1a1a1a;border:1px solid #222;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#cc0000;flex-shrink:0}
.msg-body{max-width:75%;display:flex;flex-direction:column;gap:3px}
.msg.mine .msg-body{align-items:flex-end}
.msg-meta{display:flex;align-items:center;gap:6px;font-size:10px;color:#444}
.msg.mine .msg-meta{flex-direction:row-reverse}
.msg-author{font-weight:600;color:#888}
.msg-time{color:#333}
.msg-bubble{background:#161616;border:1px solid #1e1e1e;border-radius:12px 12px 12px 3px;padding:8px 12px;font-size:13px;color:#ddd;line-height:1.5;word-break:break-word;position:relative}
.msg.mine .msg-bubble{background:#1a0000;border-color:#2a0000;border-radius:12px 12px 3px 12px}
.msg-mention{color:#60a5fa;font-weight:600}
.msg-reply-preview{background:#0d0d0d;border-left:2px solid #333;border-radius:4px;padding:4px 8px;font-size:11px;color:#555;margin-bottom:5px}
.msg-reply-preview .rp-author{color:#888;font-weight:600;font-size:10px}

/* ── Reply action button ── */
.msg-actions{display:none;gap:4px;margin-top:3px}
.msg:hover .msg-actions{display:flex}
.msg.mine .msg-actions{justify-content:flex-end}
.action-btn{background:#1a1a1a;border:1px solid #222;border-radius:5px;padding:3px 8px;font-size:10px;color:#666;cursor:pointer;transition:.15s}
.action-btn:hover{color:#fff;border-color:#444}

/* ── Reply banner (above input) ── */
#reply-banner{display:none;padding:7px 14px;background:#0d0d0d;border-top:1px solid #1a1a1a;font-size:11px;color:#666;align-items:center;gap:8px;flex-shrink:0}
#reply-banner.show{display:flex}
#reply-banner svg{width:13px;height:13px;stroke:#555;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
#reply-banner .rb-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#reply-banner .rb-cancel{background:none;border:none;color:#555;cursor:pointer;font-size:16px;line-height:1;padding:0 2px}

/* ── @mention dropdown ── */
#mention-drop{display:none;position:absolute;bottom:calc(100% + 4px);left:12px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;min-width:180px;z-index:200;max-height:160px;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#mention-drop.show{display:block}
.mention-item{padding:8px 12px;font-size:12px;color:#ccc;cursor:pointer;display:flex;align-items:center;gap:8px}
.mention-item:hover,.mention-item.active{background:#222;color:#fff}
.mention-av{width:22px;height:22px;border-radius:50%;background:#111;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#cc0000;flex-shrink:0}

/* ── Input area ── */
.chat-input-area{flex-shrink:0;padding:10px 12px;background:#0f0f0f;border-top:1px solid #1a1a1a;position:relative}
.input-row{display:flex;gap:8px;align-items:flex-end}
.chat-textarea{flex:1;background:#161616;border:1px solid #222;border-radius:20px;padding:10px 14px;color:#ddd;font-size:13px;outline:none;resize:none;font-family:inherit;max-height:100px;line-height:1.45;transition:.15s}
.chat-textarea:focus{border-color:#cc0000}
.chat-textarea::placeholder{color:#444}
.send-btn{width:40px;height:40px;border-radius:50%;background:#cc0000;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.send-btn:hover{background:#aa0000}
.send-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Date separator ── */
.date-sep{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:10px;color:#2a2a2a;text-transform:uppercase;letter-spacing:.5px}
.date-sep::before,.date-sep::after{content:"";flex:1;height:1px;background:#1a1a1a}

/* ── Empty state ── */
.chat-empty{text-align:center;padding:48px 16px;color:#333}
.chat-empty svg{width:40px;height:40px;stroke:#222;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 12px;display:block}

@media(max-width:600px){
  .msg-body{max-width:88%}
  .chat-messages{padding:10px 10px;gap:6px}
  .chat-input-area{padding:8px 10px}
}
</style></head>
<body>

<!-- Top Bar -->
<div class="chat-topbar">
  <a href="/admin/chat" class="chat-back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Rooms
  </a>
  <div class="chat-title">{{ room.name }}</div>
  <div class="chat-live"><span></span> Live</div>
</div>

<!-- Notice Bar -->
<div id="notice-zone"></div>

<!-- Messages -->
<div class="chat-messages" id="chat-msgs">
  <div class="chat-empty" id="empty-state">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Abhi koi message nahi. Pehla message bhejo!
  </div>
</div>

<!-- Reply Banner -->
<div id="reply-banner">
  <svg viewBox="0 0 24 24"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
  <div class="rb-text" id="rb-text"></div>
  <button class="rb-cancel" onclick="cancelReply()" title="Cancel">&#x2715;</button>
</div>

<!-- Input -->
<div class="chat-input-area">
  <div id="mention-drop"></div>
  <div class="input-row">
    <textarea class="chat-textarea" id="msg-input" rows="1" placeholder="Message likho... @ se mention karo" maxlength="1000"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const ROOM_ID = "{{ room.id }}";
// FIX: tojson filter use kiya — quotes wale names se JS crash nahi hoga
const MY_NAME = {{ session.get('admin_name','') | tojson }};
const MY_ID   = {{ session.get('admin_id','')   | tojson }};
const MEMBERS = {{ members | tojson }};

let replyTo     = null;
let lastMsgId   = null;
let mentionMode = false;
let mentionQ    = "";

const msgsEl = document.getElementById("chat-msgs");
const input  = document.getElementById("msg-input");
const emptyEl = document.getElementById("empty-state");

// ── Initial messages ─────────────────────────────────────────────────────
const INIT_MSGS = {{ messages | tojson }};
INIT_MSGS.forEach(m => renderMsg(m, false));
if(INIT_MSGS.length) {
  lastMsgId = INIT_MSGS[INIT_MSGS.length-1].id;
  emptyEl.style.display = "none";
}
scrollBottom();

// ── Render one message ───────────────────────────────────────────────────
function renderMsg(m, animate){
  const isMine = m.author_id === MY_ID;
  const initials = (m.author||"?")[0].toUpperCase();

  // FIX: Timestamp safely parse karo — server isoformat() bhejta hai bina Z ke
  let timeStr = "";
  if(m.timestamp){
    try{
      // isoformat string ho to Z append karo taaki UTC mane
      const ts = m.timestamp.includes("Z") ? m.timestamp : m.timestamp + "Z";
      timeStr = new Date(ts).toLocaleTimeString("hi-IN",{hour:"2-digit",minute:"2-digit"});
      if(timeStr === "Invalid Date") timeStr = "";
    } catch(e){ timeStr = ""; }
  }

  let replyHTML = "";
  if(m.reply_to && m.reply_to.author){
    replyHTML = `<div class="msg-reply-preview"><div class="rp-author">${esc(m.reply_to.author)}</div>${esc((m.reply_to.text||"").slice(0,60))}</div>`;
  }

  let textHTML = esc(m.text||"").replace(/@(\S+)/g, '<span class="msg-mention">@$1</span>');

  const el = document.createElement("div");
  el.className = "msg" + (isMine?" mine":"");
  el.dataset.id = m.id;

  // FIX: onclick mein JSON.stringify use kiya — single quotes se JS crash nahi hoga
  const replyData = JSON.stringify({id: m.id, author: m.author||"", text: (m.text||"").slice(0,50)});

  el.innerHTML = `
    <div class="msg-av">${initials}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-author">${esc(m.author||"")}</span>
        <span class="msg-time">${timeStr}</span>
      </div>
      <div class="msg-bubble">
        ${replyHTML}
        ${textHTML}
      </div>
      <div class="msg-actions">
        <button class="action-btn" onclick="setReplyData(${esc(JSON.stringify(replyData))})">&#x21A9; Reply</button>
      </div>
    </div>`;
  if(animate) el.style.animation="fadeIn .25s ease";
  msgsEl.appendChild(el);
}

// ── Polling — new messages every 3s ─────────────────────────────────────
setInterval(async ()=>{
  try{
    const r = await fetch(`/admin/chat/${ROOM_ID}/messages`);
    const data = await r.json();
    const msgs = data.messages || [];
    if(!msgs.length) return;
    const newId = msgs[msgs.length-1].id;
    if(newId === lastMsgId) return;
    const knownIdx = lastMsgId ? msgs.findIndex(m=>m.id===lastMsgId) : -1;
    const newMsgs  = knownIdx >= 0 ? msgs.slice(knownIdx+1) : msgs;
    newMsgs.forEach(m=>{ renderMsg(m,true); });
    if(newMsgs.length){
      lastMsgId = newId;
      emptyEl.style.display="none";
      scrollBottom();
    }
  }catch(e){}
}, 3000);

// ── Send message ─────────────────────────────────────────────────────────
async function sendMsg(){
  const text = input.value.trim();
  if(!text) return;
  document.getElementById("send-btn").disabled = true;
  try{
    await fetch(`/admin/chat/${ROOM_ID}/send`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({text, reply_to: replyTo})
    });
    input.value="";
    input.style.height="auto";
    cancelReply();
    const r = await fetch(`/admin/chat/${ROOM_ID}/messages`);
    const data = await r.json();
    const msgs = data.messages||[];
    if(msgs.length){
      const newId = msgs[msgs.length-1].id;
      if(newId!==lastMsgId){
        const knownIdx = lastMsgId?msgs.findIndex(m=>m.id===lastMsgId):-1;
        const newMsgs  = knownIdx>=0?msgs.slice(knownIdx+1):msgs;
        newMsgs.forEach(m=>renderMsg(m,true));
        lastMsgId=newId; emptyEl.style.display="none"; scrollBottom();
      }
    }
  }catch(e){}
  document.getElementById("send-btn").disabled=false;
  input.focus();
}

// ── Reply ────────────────────────────────────────────────────────────────
// FIX: JSON object pass karo, string injection nahi
function setReplyData(jsonStr){
  try{
    const d = JSON.parse(JSON.parse(jsonStr));
    replyTo = {id: d.id, author: d.author, text: d.text};
    document.getElementById("rb-text").textContent=`${d.author}: ${d.text}`;
    document.getElementById("reply-banner").classList.add("show");
    input.focus();
  }catch(e){}
}
function cancelReply(){ replyTo=null; document.getElementById("reply-banner").classList.remove("show"); }

// ── @mention ─────────────────────────────────────────────────────────────
const mentionDrop = document.getElementById("mention-drop");
input.addEventListener("input",function(){
  this.style.height="auto";
  this.style.height=Math.min(this.scrollHeight,100)+"px";
  const val=this.value, cursor=this.selectionStart;
  const before=val.slice(0,cursor);
  const match=before.match(/@(\w*)$/);
  if(match){
    mentionMode=true; mentionQ=match[1].toLowerCase();
    showMentionDrop(mentionQ);
  } else {
    mentionMode=false; mentionDrop.classList.remove("show");
  }
});

function showMentionDrop(q){
  const filtered=MEMBERS.filter(m=>m.name&&m.name.toLowerCase().includes(q)).slice(0,6);
  if(!filtered.length){ mentionDrop.classList.remove("show"); return; }
  mentionDrop.innerHTML=filtered.map((m)=>`<div class="mention-item" data-name="${esc(m.name)}" onclick="insertMention(${JSON.stringify(m.name)})">`+
    `<div class="mention-av">${(m.name||"?")[0].toUpperCase()}</div>${esc(m.name)}</div>`).join("");
  mentionDrop.classList.add("show");
}

function insertMention(name){
  const val=input.value, cursor=input.selectionStart;
  const before=val.slice(0,cursor), after=val.slice(cursor);
  const newBefore=before.replace(/@\w*$/, "@"+name+" ");
  input.value=newBefore+after;
  mentionDrop.classList.remove("show");
  mentionMode=false;
  input.focus();
}

input.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendMsg(); }
  if(e.key==="Escape"){ mentionDrop.classList.remove("show"); cancelReply(); }
});

document.addEventListener("click",function(e){
  if(!mentionDrop.contains(e.target)&&e.target!==input) mentionDrop.classList.remove("show");
});

// ── Notices ──────────────────────────────────────────────────────────────
async function loadNotices(){
  try{
    const r=await fetch("/api/admin/notices");
    const data=await r.json();
    const zone=document.getElementById("notice-zone");
    zone.innerHTML="";
    (data.notices||[]).forEach(n=>{
      const bar=document.createElement("div");
      bar.className="notice-bar";
      bar.innerHTML=`<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`+
        `<span class="n-text">${esc(n.text)}</span>`+
        `<button class="notice-close" onclick="dismissNotice(${JSON.stringify(n.id)},this.parentElement)">&#x2715;</button>`;
      zone.appendChild(bar);
    });
  }catch(e){}
}
async function dismissNotice(id,el){
  await fetch(`/admin/notice/${id}/dismiss`,{method:"POST"});
  el.remove();
}
loadNotices();

// ── Helpers ───────────────────────────────────────────────────────────────
function scrollBottom(){ msgsEl.scrollTop=msgsEl.scrollHeight; }
function esc(s){ const d=document.createElement("div"); d.textContent=s||""; return d.innerHTML; }
</script>
</body></html>
